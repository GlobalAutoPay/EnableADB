<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wYMagicServer - Official Downloads</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Plus Jakarta Sans e Inter para tipografía premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030306;
            --font-primary: 'Plus Jakarta Sans', 'Inter', sans-serif;
            --accent-red: #ef4444;
        }

        /* Bloqueo absoluto de scroll en html y body para móviles */
        html, body {
            width: 100%;
            height: 100%;
            height: -webkit-fill-available;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
            background-color: var(--bg-color);
            font-family: var(--font-primary);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fondo fijo optimizado para rendimiento extremo (sin repaints) */
        .bg-gradient-fixed {
            position: fixed;
            inset: 0;
            background-color: #030306;
            background-image: radial-gradient(circle at 50% 30%, #1a0407 0%, #030306 80%);
            z-index: -2;
            pointer-events: none;
        }

        /* Panel esmerilado de vidrio templado oscuro con bordes hiper-definidos */
        .glass-panel {
            background: rgba(12, 6, 8, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                inset 0 1px 1px rgba(255, 255, 255, 0.08),
                inset 0 -1px 1px rgba(0, 0, 0, 0.5),
                0 20px 50px rgba(0, 0, 0, 0.85);
            will-change: transform;
        }

        /* Arco planetario del fondo optimizado para GPU sin filtros pesados */
        .cosmic-ring-container {
            position: absolute;
            bottom: -430px;
            left: 50%;
            transform: translateX(-50%);
            width: 820px;
            height: 820px;
            pointer-events: none;
            z-index: 10;
        }

        .cosmic-ring-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border-top: 4px solid #ef4444;
            box-shadow: 
                0 -15px 35px rgba(239, 68, 68, 0.4),
                inset 0 15px 35px rgba(239, 68, 68, 0.2);
            opacity: 0.85;
            will-change: opacity;
        }

        .cosmic-ring-core {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border-top: 1.5px solid #ffffff;
            box-shadow: 
                0 -3px 10px rgba(255, 255, 255, 0.9),
                0 -8px 20px #b91c1c;
            opacity: 0.95;
        }

        /* Capa de atmósfera estática */
        .ambient-haze {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(185, 28, 28, 0.15) 0%, transparent 70%);
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
        }

        /* Botones de descarga con bordes definidos estilo cristal pulido */
        .download-btn {
            background: rgba(18, 10, 12, 0.5);
            border: 1px solid rgba(239, 68, 68, 0.18);
            box-shadow: 
                inset 0 1px 1px rgba(255, 255, 255, 0.03),
                0 4px 10px rgba(0, 0, 0, 0.3);
            transition: border-color 0.25s cubic-bezier(0.16, 1, 0.3, 1), 
                        background-color 0.25s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            will-change: transform;
        }

        /* Hover de alto rendimiento exclusivo para ordenadores (evita problemas en móviles) */
        @media (hover: hover) {
            .download-btn:hover {
                background-color: rgba(239, 68, 68, 0.08);
                border-color: rgba(239, 68, 68, 0.35);
                transform: translateY(-1.5px);
            }
        }

        /* Feedback táctil instantáneo y fluido para móviles */
        .download-btn:active {
            transform: scale(0.98);
            background-color: rgba(239, 68, 68, 0.14) !important;
            border-color: rgba(239, 68, 68, 0.45) !important;
        }

        /* Progreso de descarga optimizado sin filtros de desenfoque */
        .download-progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.06) 0%, rgba(239, 68, 68, 0.22) 100%);
            border-right: 2px solid #ef4444;
            transition: width 0.08s linear;
            pointer-events: none;
            will-change: width;
        }

        /* Botón de Soporte Flotante con refracción suave */
        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 50;
            background: rgba(18, 48, 28, 0.6);
            border: 1.5px solid rgba(34, 197, 94, 0.3);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 10px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.25s;
            will-change: transform;
        }

        .whatsapp-float:active {
            transform: scale(0.9);
            background-color: rgba(34, 197, 94, 0.4);
        }
    </style>
</head>

    <!-- ARCO CÓSMICO DEL FONDO (Estabilizado mecánicamente sin repaints innecesarios) -->

    <!-- Script ultra-ligero y asíncrono para descargas -->
    <script>
        const activeDownloads = {};

        function startDownload(id, redirectUrl) {
            if (activeDownloads[id]) return;

            activeDownloads[id] = true;

            const progressBar = document.getElementById(`progress-bar-${id}`);
            const textTitle = document.getElementById(`text-title-${id}`);
            const textSubtitle = document.getElementById(`text-subtitle-${id}`);
            const badge = document.getElementById(`badge-dl-${id}`);
            const icon = document.getElementById(`icon-dl-${id}`);

            // Cambiar icono a spinner animado óptimo en CSS nativo
            icon.innerHTML = `<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-dasharray="35" class="animate-spin" fill="none"></circle>`;
            
            let progress = 0;
            const originalTitle = textTitle.innerText;
            textTitle.innerHTML = `Downloading...`;
            badge.className = "bg-red-500/20 border border-red-500/40 px-2.5 py-1.5 rounded-lg text-xs font-extrabold text-red-400 animate-pulse";

            const interval = setInterval(() => {
                // Incremento aleatorio fluido
                progress += Math.floor(Math.random() * 8) + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    progressBar.style.width = '100%';
                    
                    setTimeout(() => {
                        textTitle.innerHTML = originalTitle;
                        textSubtitle.innerHTML = `Redirecting to server...`;
                        badge.innerHTML = `COMPLETED ✓`;
                        badge.className = "bg-emerald-500/25 border border-emerald-500/40 px-2.5 py-1.5 rounded-lg text-xs font-bold text-emerald-400";
                        
                        // Icono de Checkmark de éxito
                        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"></path>`;
                        
                        // Redirección directa al correspondiente link de MEGA provisto
                        setTimeout(() => {
                            window.location.href = redirectUrl;
                        }, 500);

                    }, 150);
                } else {
                    progressBar.style.width = `${progress}%`;
                    badge.innerHTML = `${progress}%`;
                    textSubtitle.innerHTML = `Connecting to high-speed mirror...`;
                }
            }, 80);
        }
    </script>
