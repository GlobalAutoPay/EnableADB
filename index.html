<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wYMagicServer - Official Downloads</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Plus Jakarta Sans e Inter para tipografía premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030306;
            --font-primary: 'Plus Jakarta Sans', 'Inter', sans-serif;
            --accent-red: #ef4444;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 30%, #1a0407 0%, #030306 80%);
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Forzar aceleración de hardware en capas complejas para fluidez absoluta en iOS/Android */
        .ambient-haze, 
        .cosmic-ring-container, 
        .cosmic-ring-glow, 
        .cosmic-ring-core, 
        .glass-panel, 
        .download-btn {
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            perspective: 1000px;
            will-change: transform, opacity;
        }

        /* Panel esmerilado de vidrio templado optimizado para rendimiento móvil (blur a 16px es óptimo) */
        .glass-panel {
            background: rgba(12, 6, 8, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                inset 0 1px 1px rgba(255, 255, 255, 0.12),
                inset 0 -1.5px 1.5px rgba(0, 0, 0, 0.6),
                0 30px 80px -10px rgba(0, 0, 0, 0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-panel:hover {
            box-shadow: 
                inset 0 1px 1px rgba(255, 255, 255, 0.15),
                inset 0 -1.5px 1.5px rgba(0, 0, 0, 0.6),
                0 0 50px rgba(239, 68, 68, 0.08),
                0 30px 80px -10px rgba(0, 0, 0, 0.95);
        }

        /* Anillo luminoso de fondo optimizado (animaciones fluidas sin blur dinámico) */
        .cosmic-ring-container {
            position: absolute;
            bottom: -430px;
            left: 50%;
            transform: translateX(-50%) translate3d(0, 0, 0);
            width: 820px;
            height: 820px;
            pointer-events: none;
            z-index: 10;
        }

        .cosmic-ring-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border-top: 5px solid #ef4444;
            box-shadow: 
                0 -20px 45px rgba(239, 68, 68, 0.5),
                inset 0 20px 45px rgba(239, 68, 68, 0.3);
            filter: blur(5px);
            animation: ring-pulse 8s infinite ease-in-out;
        }

        .cosmic-ring-core {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border-top: 1.5px solid #ffffff;
            box-shadow: 
                0 -4px 15px rgba(255, 255, 255, 0.95),
                0 -10px 28px #b91c1c;
            opacity: 0.98;
        }

        @keyframes ring-pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1.0; transform: scale(1.015); }
        }

        .ambient-haze {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(185, 28, 28, 0.15) 0%, transparent 75%);
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) translate3d(0, 0, 0);
            pointer-events: none;
            z-index: 1;
            animation: haze-glow 14s infinite ease-in-out;
        }

        @keyframes haze-glow {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1.0; transform: translate(-50%, -50%) scale(1.08); }
        }

        /* Estilo premium de botones de descarga: bordes ultra pulidos y definidos */
        .download-btn {
            background: rgba(255, 255, 255, 0.015);
            border: 1.5px solid rgba(255, 255, 255, 0.08); /* Borde nítido */
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.04),
                0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .download-btn:hover {
            background: rgba(239, 68, 68, 0.06);
            border-color: rgba(239, 68, 68, 0.35); /* Borde rojo nítido al pasar mouse */
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 10px 30px -5px rgba(239, 68, 68, 0.12);
            transform: translateY(-1.5px);
        }

        .download-btn:active {
            transform: translateY(1px) scale(0.99);
            transition: all 0.1s ease;
        }

        .download-progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.05) 0%, rgba(239, 68, 68, 0.18) 100%);
            border-right: 2px solid #ef4444;
            transition: width 0.1s linear;
            pointer-events: none;
        }

        /* Ocultar scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

    <script>
        // Controladores de audio sintetizado para feedback orgánico
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isSoundEnabled = true;

        function playInterfaceSound(type) {
            if (!isSoundEnabled) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (type === 'click') {
                    osc.frequency.setValueAtTime(450, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.04);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.04);
                } else if (type === 'hover') {
                    osc.frequency.setValueAtTime(280, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(340, audioCtx.currentTime + 0.03);
                    gain.gain.setValueAtTime(0.012, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.03);
                } else if (type === 'success') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(520, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08);
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.16);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.35);
                }
            } catch (e) {
                console.log("Audio temporalmente bloqueado hasta interacción del usuario.");
            }
        }

        // Simulación interactiva de proceso de descarga con redirección segura
        const activeDownloads = {};

        function startDownload(id, redirectUrl) {
            if (activeDownloads[id]) return; // Evitar clicks duplicados durante la animación

            activeDownloads[id] = true;
            playInterfaceSound('click');

            const btn = document.getElementById(`btn-download-${id}`);
            const progressBar = document.getElementById(`progress-bar-${id}`);
            const textTitle = document.getElementById(`text-title-${id}`);
            const textSubtitle = document.getElementById(`text-subtitle-${id}`);
            const badge = document.getElementById(`badge-dl-${id}`);
            const icon = document.getElementById(`icon-dl-${id}`);

            // Cambiar icono original de descarga a un spinner animado circular
            icon.innerHTML = `<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-dasharray="35" class="animate-spin" fill="none"></circle>`;
            
            let progress = 0;
            const originalTitle = textTitle.innerText;
            textTitle.innerHTML = `Downloading...`;
            badge.className = "bg-red-500/20 border border-red-500/40 px-3 py-1.5 rounded-lg text-xs font-extrabold text-red-400 animate-pulse";

            const interval = setInterval(() => {
                // Incremento dinámico realista de velocidad
                progress += Math.floor(Math.random() * 8) + 4;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    // Finalización de animación exitosa
                    progressBar.style.width = '100%';
                    setTimeout(() => {
                        playInterfaceSound('success');
                        textTitle.innerHTML = originalTitle;
                        textSubtitle.innerHTML = `Redirecting to server...`;
                        badge.innerHTML = `COMPLETED ✓`;
                        badge.className = "bg-emerald-500/25 border border-emerald-500/40 px-3 py-1.5 rounded-lg text-xs font-bold text-emerald-400";
                        
                        // Icono de Checkmark de éxito
                        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M4.5 12.75l6 6 9-13.5" stroke="currentColor"></path>`;
                        
                        // Enviar al link de MEGA provisto después de un micro retardo para asimilar el éxito
                        setTimeout(() => {
                            window.location.href = redirectUrl;
                        }, 900);

                    }, 200);
                } else {
                    progressBar.style.width = `${progress}%`;
                    badge.innerHTML = `${progress}%`;
                    textSubtitle.innerHTML = `Connecting to high-speed mirror node...`;
                }
            }, 100);
        }

        // Vincular sonidos analógicos sutiles en hover a cada fila de descarga
        document.querySelectorAll('.download-btn').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                playInterfaceSound('hover');
            });
        });

        // Activar el AudioContext en la primera acción de interacción del visitante
        document.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });
    </script>
